<!DOCTYPE html>
<html>
<head>
<title>Panna Persona Chat</title>
<style>
body{
font-family: Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

#chatbox{
width:600px;
height:400px;
overflow-y:auto;
border:1px solid #444;
padding:10px;
margin-top:20px;
}

.message{
margin:8px 0;
}

.user{
color:#6cf;
}

.bot{
color:#9f9;
}

input{
width:500px;
padding:10px;
margin-top:10px;
}

button{
padding:10px;
}
</style>
</head>

<body>

<h2>Panna Persona Chat</h2>

<div id="chatbox"></div>

<input id="userInput" placeholder="Ask something..."/>
<button onclick="sendMessage()">Send</button>

<script>

const API_KEY = "YOUR_ANTHROPIC_API_KEY";

const personaPrompt = `
You are role-playing an interactive persona.

Name: Panna
Age: 21
University: DIT University, Dehradun, Uttarakhand, India

Background:
Panna is a university student with a terrible sleep schedule because of assignment pressure.
Usually stays awake until 3–5 AM doing work, worrying about deadlines, or scrolling on the phone.

Personality:
- slightly anxious
- ambitious but tired
- overthinks at night
- uses humor about student stress

Rules:
Stay in character as Panna.
Answer all questions naturally.
Never say you are an AI.
Speak casually like a student chatting late at night.
`;

async function sendMessage(){

let input = document.getElementById("userInput").value;

addMessage("You: " + input,"user");

const response = await fetch("https://api.anthropic.com/v1/messages",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-api-key":API_KEY,
"anthropic-version":"2023-06-01"
},
body:JSON.stringify({
model:"claude-3-haiku-20240307",
max_tokens:300,
messages:[
{
role:"user",
content: personaPrompt + "\nUser: " + input
}
]
})
});

const data = await response.json();

let reply = data.content[0].text;

addMessage("Panna: " + reply,"bot");

document.getElementById("userInput").value="";
}

function addMessage(text,className){

let div=document.createElement("div");
div.className="message "+className;
div.textContent=text;

document.getElementById("chatbox").appendChild(div);

}

</script>

</body>
</html>
